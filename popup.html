<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Adicionar Tag</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        
  <link rel="stylesheet" href="css/sweetalert2.min.css">

  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:14px;background:#fff;min-width:320px}
    h3{margin:0 0 8px 0;font-size:16px}
    label{display:block;margin-top:10px;font-size:13px;color:#333}
    input[type="text"]{width:100%;padding:8px;margin-top:6px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}
    input[type="color"]{height:36px;padding:2px;border:none;background:transparent;margin-top:6px}
    .row{display:flex;gap:8px;align-items:center} /* Classe existente para layout flexível */
    button{margin-top:14px;padding:8px 12px;border-radius:6px;border:none;background:#1976d2;color:#fff;cursor:pointer}
    .btn-danger{background:#dc3545}
    .note{font-size:12px;color:#666;margin-top:8px}

    body {
            font-family: Arial, sans-serif;
            min-width: 300px; 
            padding: 10px;
        }

        /* ESTILOS PARA A GALERIA DE TAGS MAIS USADAS (MANTIDO) */
        #mostUsedTagsGallery {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }

        /* Configuração do Layout de Grade (MANTIDO) */
        #tagsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 8px; 
        }

        /* Estilo do Item Clicável (MANTIDO) */
        .grid-tag-item {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: background-color 0.1s;
            border: 1px solid #e0e0e0;
            user-select: none;
        }

        .grid-tag-item:hover {
            background-color: #e0e0e0;
        }
        
        .grid-tag-item:active {
            opacity: 0.8;
        }

        .grid-tag-item .tag-preview {
            display: block;
            width: 100%;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 5px;
        }

        .grid-tag-item .tag-text {
            font-size: 0.85em;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        /* ESTILOS PARA A LISTA DETALHADA EXISTENTE (MANTIDO) */
        .tag-item {
            display: flex;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
        .tag-item:last-child {
            border-bottom: none;
        }
        .tag-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .tag-name {
            flex-grow: 1;
            font-weight: bold;
        }
        .tag-process-id {
            font-size: 0.8em;
            color: #666;
            margin-left: 10px;
            font-style: italic;
        }
  </style>
</head>
<body>
   <h3>Tag do Processo</h3>
<div>
    <label class="text-dark">Número do Processo</label>
  <input type="text" id="processNumber" class='bg-white text-dark' value='' / readonly>

  <label class='d-none text-dark'>ID do Processo</label>
  <input class='d-none bg-white text-dark'  type="text" id="processId" value='' / readonly>

  <label class="text-dark">Cor e Nome da Tag</label> <div class="row" style="margin-top: 6px; align-items: center;">
    <input type="color" id="tagColor" value="#F2A516" style="margin-top: 0;" />
    <input type="text"  class='bg-white text-dark' id="tagName" placeholder="Ex: AGUARDANDO" style="flex-grow: 1; margin-top: 0;" autofocus />
        
  <button  style="margin-top: 0px;" id="saveTag">Salvar</button>
    
  </div>
  <div id="quickTagsGallery bg" style="margin-top: 20px;">
        <h2>Tags Rápidas</h2>
        <p class="note">Tags pré-definidas nas configurações.</p>
        <div id="tagsGridRapidas">
            <p>Carregando tags rápidas...</p>
        </div>
    </div>
    
    <div id="mostUsedTagsGallery" style="margin-top: 20px;">
        <h2>Tags Mais Usadas</h2>
        <p class="note">As 6 tags mais aplicadas.</p>
        <div id="tagsGridMaisUsadas"> 
            <p>Calculando tags de atalho...</p>
        </div>
    </div>

        <!-- Importação do JS do SweetAlert2 LOCAL -->
        <script src="js/sweetalert2.min.js"></script>
        <!-- Importação do JS do Bootstrap 5 LOCAL -->
        <script src="js/bootstrap.min.js"></script>


<script src="js/jquery.js" type="text/javascript"></script>
<script src="formUtils.js"></script>  
<script src="listTags.js"></script>
<script src="popup.js"></script>

<script src="theme.js"></script>
</body>
</html>
