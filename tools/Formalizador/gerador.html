<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Secretarias Editável</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/sweetalert2.min.css">
    <link href="../../css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Century Gothic', sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        } h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }
        #tabela-container {
            margin-top: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            background-color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #f0f0f0;
            color: #34495e;
        }
    
        button {
            padding: 10px 15px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            transition: background-color 0.3s ease;
            margin: 5px;
            text-align: center;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #email_gerado {
            margin-top: 30px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #ffffff;
            font-size: 9px;
            line-height: 1.5;
            white-space: pre-wrap;
            font-family: monospace;
            position: relative;
        }
        #email_gerado h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
       

.button-container {
    display: flex; /* Ativa o Flexbox para o container */
    justify-content: center; /* Centraliza os itens horizontalmente */
    align-items: flex-start; /* Alinha os itens ao topo do container (opcional, mas bom para controle) */
    width: 100%; /* Garante que o container ocupe toda a largura disponível */
    padding-top: 10px; /* Espaçamento superior, equivalente ao seu 'top: 10px;' anterior */
    /* Se você quiser um espaçamento entre os botões: */
    gap: 10px;
}

#copiar_email,
#selecionar_email,
.copiar_texto {
    /* Remova a propriedade 'position: absolute;' pois o Flexbox cuidará do posicionamento */
    background-color: #4CAF50;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    transition: background-color 0.3s ease;
}
        #copiar_email {
            right: 250px;
        }
        #selecionar_email {
            right: 10px;
        }
        .copiar_texto {
            right: 130px;
        }
        #copiar_texto_terceiro{
            right: 130px;
        }
        #copiar_texto_quarto{
            right: 130px;
        }
  
        #copiar_email:active, #selecionar_email:active, .copiar_texto:active {
            background-color: #2b5e2e;
        }
        .hidden {
            display: none;
        }
        .alert {
            color: #721c24;
            background-color: #f8d7da;
            border-color: #f5c6cb;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid transparent;
            border-radius: 5px;
        }
        .alert-success {
            color: #155724;
            background-color: #d4edda;
            border-color: #c3e6cb;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            padding: 15px;
        }

        .checkbox-container {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #808080;
            background-color: #fff;
            width: 150px;
            height: 100px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-container.checked {
            border-color: green;
            background-color: #e6ffe6;
        }

        .checkbox-text {
            text-align: center;
            color: #333;
            padding: 5px;
        }

        .hidden-checkbox {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }
       .button-container {
    display: flex; /* Coloca os itens em linha (um ao lado do outro) por padrão */
    justify-content: center; /* Centraliza os itens horizontalmente */
    align-items: flex-start; /* Alinha os itens ao topo do container */
    width: 100%; /* Garante que o container ocupe toda a largura */
    padding-top: 10px; /* Espaçamento superior */
    gap: 10px; /* Espaçamento entre os botões */
}

#copiar_email,
#selecionar_texto_segundo,
#selecionar_texto_terceiro,
#selecionar_texto_quarto,
.copiar_texto {
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    transition: background-color 0.3s ease;
}

    </style>
</head>
<body style="color:#000;">
    <h1>Formalização de Termo de ata</h1>
    <h2>Selecione as Secretarias:(<span id="contadorSelecionadas">0</span>)</h2>

    <form id="secretariasForm">
        <div class="button-container mb-3">
            <button id="selecionarTudo">Selecionar Tudo</button>
            <button id="deselecionarTudo">Deselecionar Tudo</button>

        </div>
        <div id="listaSecretarias">
        </div>
         <input type="checkbox" name="data" value="teste">Inlcuir Data</input>
        <button type="submit">Enviar</button>
    </form>
    <div id="mensagem" class="alert hidden"></div>
    <div id="resultado" style='color:#000;'></div>
    <div id="email_gerado" class="hidden">


    <div class="button-container">
           <!-- <button id="selecionar_email" onclick="selecionarEmail()">Selecionar tudo</button> -->
<button id="selecionar_texto_segundo" class="copiar_texto">Selecionar Texto 1</button>
<button id="selecionar_texto_terceiro" class="copiar_texto">Selecionar Texto 2</button>
<button id="selecionar_texto_quarto" class="copiar_texto">Selecionar Texto 3</button>

</div>

        <div id="titulo_email"></div>
        <div id="output_email_quarto"></div>
        <div id="output_email_segundo"></div>
        <div id="output_email_terceiro"></div>
   
    </div>

<script src="../../js/sweetalert2.min.js"></script>
    <script src="../../js/bootstrap.min.js"></script>
    <script src='gerador.js'></script>

<script src="theme.js"></script>
</body>
</html>
