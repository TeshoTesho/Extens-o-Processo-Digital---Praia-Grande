<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<title>Extrator de Pregão</title>

  <link href="../../css/bootstrap.min.css" rel="stylesheet" />


<script src="../../js/sweetalert2.min.js"></script>
    <script src="../../js/bootstrap.min.js"></script>

<script src="../../js/pdf.min.js"></script>
<script src="../../js/xlsx.full.min.js"></script>
<script src="../../js/jszip.min.js"></script>

<style>

.drop-area{
border:2px dashed #0d6efd;
border-radius:10px;
padding:50px;
text-align:center;
background:#f8fbff;
cursor:pointer;
transition:.2s;
}

.drop-area:hover{
background:#eef5ff;
}

</style>

</head>

<body class="bg-light">

<div class="container py-4">

<div class="card shadow-sm">

<div class="card-header bg-primary text-white">
<h5 class="mb-0">Extrator de PDF - Quadro Resumo de Pregão</h5>
</div>

<div class="card-body">

<div class="row mb-3">

<div class="col-md-6">

<div class="form-check form-switch">
<input class="form-check-input" type="checkbox" id="agrupar" >
<label class="form-check-label">
Agrupar quantidades de itens repetidos
</label>
</div>

</div>

<div class="col-md-6 text-end">

<button id="exportar" class="btn btn-success">
Exportar Excel
</button>

</div>

</div>

<div id="drop" class="drop-area">

<h5 class="text-primary">Arraste o PDF aqui</h5>
<p class="text-muted mb-0">ou clique para selecionar</p>

<input type="file" id="fileInput" hidden accept=".pdf">

</div>

<hr>

<div id="status" class="alert alert-secondary mt-3">
Aguardando arquivo...
</div>

<div class="table-responsive mt-3">

<table class="table table-striped table-sm">

<thead class="table-dark">

<tr>
<th>Fornecedor</th>
<th>Item</th>
<th>Descrição</th>
<th>Unidade</th>
<th>Quantidade</th>
<th>Valor</th>
</tr>

</thead>

<tbody id="preview"></tbody>
<div class="card mt-3 d-none" id='forncheck'>
<div class="card-header">
Fornecedores encontrados - <span class="text-muted">Selecione para exportar o arquivo</span>
</div>

<div class="card-body" id="listaFornecedores">
Nenhum fornecedor carregado
</div>
</div>

</table>

</div>

</div>

</div>

</div>

<script src="script.js"></script>
<script src="../../them2e.js"></script>

</body>
</html>
