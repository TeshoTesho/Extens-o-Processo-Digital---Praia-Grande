<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Organizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5rem;
            font-weight: 300;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(45deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover, .upload-area.drag-over {
            border-color: #764ba2;
            background: linear-gradient(45deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            transform: translateY(-2px);
        }

        .upload-text {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 15px;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.9rem;
        }

        .pdf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .pdf-item {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: move;
            border: 2px solid transparent;
        }

        .pdf-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            border-color: #667eea;
        }

        .pdf-item.dragging {
            opacity: 0.5;
            transform: rotate(5deg);
        }

        .pdf-item.combined {
            border-color: #51cf66;
            background: linear-gradient(to bottom right, white, rgba(81, 207, 102, 0.05));
        }

        .pdf-preview {
            width: 100%;
            height: 120px;
            background: #f8f9fa;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .pdf-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .pdf-icon {
            font-size: 3rem;
            color: #dc3545;
        }

        .pdf-icon.combined {
            color: #51cf66;
        }

        .pdf-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            word-break: break-word;
            font-size: 0.9rem;
        }

        .pdf-pages {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .pdf-controls {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #51cf66, #40c057);
            color: white;
            padding: 15px 30px;
            font-size: 1.1rem;
            margin: 20px auto;
            display: block;
            width: fit-content;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(81, 207, 102, 0.3);
        }

        .btn-download {
            background: linear-gradient(135deg, #339af0, #1c7ed6);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(51, 154, 240, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 1200px;
            max-height: 90%;
            background: white;
            border-radius: 20px;
            padding: 30px;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .modal-title {
            font-size: 1.5rem;
            color: #333;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #999;
            transition: color 0.2s ease;
        }

        .close-btn:hover {
            color: #333;
        }

        .pages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .page-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: move;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
        }

        .page-item:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .page-item.selected {
            border-color: #dc3545;
            background: rgba(220, 53, 69, 0.1);
        }

        .page-item.dragging {
            opacity: 0.5;
        }

        .page-preview {
            width: 100%;
            height: 200px;
            background: white;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .page-preview canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .page-preview .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .page-number {
            font-size: 0.8rem;
            color: #666;
            font-weight: 500;
        }

        .page-controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-size: 1.1rem;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-btn {
            background: linear-gradient(135deg, #868e96, #495057);
            color: white;
            margin: 20px auto;
            display: block;
            width: fit-content;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(134, 142, 150, 0.3);
        }

        @media (max-width: 768px) {
            .pdf-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .pages-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }

            .page-preview {
                height: 150px;
            }

            .modal-content {
                width: 95%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PDF Organizer</h1>

        <div class="upload-area" id="uploadArea">
            <div class="upload-text">📄 Drag & Drop PDF files here</div>
            <div class="upload-subtext">or click to browse files</div>
            <input type="file" id="fileInput" multiple accept=".pdf" style="display: none;">
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            Processing files...
        </div>

        <div class="pdf-grid" id="pdfGrid"></div>

        <button class="btn btn-success" id="combineBtn" style="display: none;">
            📚 Combine All PDFs
        </button>

        <button class="btn back-btn" id="backBtn" style="display: none;">
            ← Back to Individual PDFs
        </button>
    </div>

    <!-- Modal for organizing individual PDF -->
    <div class="modal" id="organizeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Organize PDF</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>

            <div class="page-controls">
                <button class="btn btn-danger" id="removeSelected">🗑️ Remove Selected</button>
                <button class="btn btn-primary" id="selectAll">✓ Select All</button>
                <button class="btn btn-primary" id="deselectAll">✗ Deselect All</button>
                <button class="btn btn-success" id="savePdf">💾 Save Changes</button>
            </div>

            <div class="pages-grid" id="pagesGrid"></div>
        </div>
    </div>

    <script>
        // Set PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        class PDFOrganizer {
            constructor() {
                this.pdfs = [];
                this.combinedPdf = null;
                this.currentPdfIndex = -1;
                this.isCombinedView = false;
                this.pageCanvases = new Map(); // Cache for rendered pages
                this.initializeEventListeners();
            }

            initializeEventListeners() {
                const uploadArea = document.getElementById('uploadArea');
                const fileInput = document.getElementById('fileInput');
                const combineBtn = document.getElementById('combineBtn');
                const backBtn = document.getElementById('backBtn');
                const modal = document.getElementById('organizeModal');
                const closeModal = document.getElementById('closeModal');

                // Upload area events
                uploadArea.addEventListener('click', () => fileInput.click());
                uploadArea.addEventListener('dragover', this.handleDragOver.bind(this));
                uploadArea.addEventListener('dragleave', this.handleDragLeave.bind(this));
                uploadArea.addEventListener('drop', this.handleDrop.bind(this));

                fileInput.addEventListener('change', this.handleFileSelect.bind(this));
                combineBtn.addEventListener('click', this.combineAllPDFs.bind(this));
                backBtn.addEventListener('click', this.showIndividualPDFs.bind(this));

                // Modal events
                closeModal.addEventListener('click', () => modal.style.display = 'none');
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) modal.style.display = 'none';
                });

                // Page control events
                document.getElementById('removeSelected').addEventListener('click', this.removeSelectedPages.bind(this));
                document.getElementById('selectAll').addEventListener('click', this.selectAllPages.bind(this));
                document.getElementById('deselectAll').addEventListener('click', this.deselectAllPages.bind(this));
                document.getElementById('savePdf').addEventListener('click', this.savePdfChanges.bind(this));
            }

            handleDragOver(e) {
                e.preventDefault();
                e.currentTarget.classList.add('drag-over');
            }

            handleDragLeave(e) {
                e.currentTarget.classList.remove('drag-over');
            }

            handleDrop(e) {
                e.preventDefault();
                e.currentTarget.classList.remove('drag-over');
                const files = Array.from(e.dataTransfer.files).filter(file => file.type === 'application/pdf');
                if (files.length > 0) {
                    this.processFiles(files);
                }
            }

            handleFileSelect(e) {
                const files = Array.from(e.target.files);
                this.processFiles(files);
            }

            async processFiles(files) {
                const loading = document.getElementById('loading');
                loading.style.display = 'block';

                for (const file of files) {
                    try {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                        const pageCount = pdfDoc.getPageCount();

                        // Load PDF.js document for rendering
                        const pdfJsDoc = await pdfjsLib.getDocument(arrayBuffer.slice()).promise;

                        const pdfData = {
                            name: file.name,
                            file: file,
                            originalArrayBuffer: arrayBuffer.slice(),
                            currentArrayBuffer: arrayBuffer.slice(),
                            originalPdfDoc: null,
                            pdfJsDoc: pdfJsDoc, // Store PDF.js document for rendering
                            pageCount: pageCount,
                            originalPageCount: pageCount,
                            pages: Array.from({length: pageCount}, (_, i) => ({
                                originalIndex: i,
                                currentIndex: i,
                                selected: false,
                                displayNumber: i + 1
                            }))
                        };

                        this.pdfs.push(pdfData);
                    } catch (error) {
                        console.error('Error processing PDF:', error);
                        alert(`Error processing ${file.name}: ${error.message}`);
                    }
                }

                loading.style.display = 'none';
                this.renderPDFs();
                this.updateCombineButton();
            }

            renderPDFs() {
                const grid = document.getElementById('pdfGrid');
                grid.innerHTML = '';

                this.pdfs.forEach((pdf, index) => {
                    const pdfItem = document.createElement('div');
                    pdfItem.className = 'pdf-item';
                    pdfItem.draggable = true;
                    pdfItem.dataset.index = index;

                    pdfItem.innerHTML = `
                        <div class="pdf-preview">
                            <div class="pdf-icon">📄</div>
                        </div>
                        <div class="pdf-name">${pdf.name}</div>
                        <div class="pdf-pages">${pdf.pages.length} pages</div>
                        <div class="pdf-controls">
                            <button class="btn btn-primary organize-btn">⚙️ Organize</button>
                            <button class="btn btn-danger remove-btn">🗑️ Remove</button>
                        </div>
                    `;

                    // Add event listeners
                    pdfItem.addEventListener('dragstart', this.handlePdfDragStart.bind(this));
                    pdfItem.addEventListener('dragover', this.handlePdfDragOver.bind(this));
                    pdfItem.addEventListener('drop', this.handlePdfDrop.bind(this));
                    pdfItem.addEventListener('dragend', this.handlePdfDragEnd.bind(this));

                    pdfItem.querySelector('.organize-btn').addEventListener('click', () => this.openOrganizeModal(index));
                    pdfItem.querySelector('.remove-btn').addEventListener('click', () => this.removePDF(index));

                    grid.appendChild(pdfItem);
                });
            }

            renderCombinedPDF() {
                const grid = document.getElementById('pdfGrid');
                grid.innerHTML = '';

                if (!this.combinedPdf) return;

                const pdfItem = document.createElement('div');
                pdfItem.className = 'pdf-item combined';

                pdfItem.innerHTML = `
                    <div class="pdf-preview">
                        <div class="pdf-icon combined">📚</div>
                    </div>
                    <div class="pdf-name">${this.combinedPdf.name}</div>
                    <div class="pdf-pages">${this.combinedPdf.pages.length} pages</div>
                    <div class="pdf-controls">
                        <button class="btn btn-primary organize-btn">⚙️ Organize</button>
                        <button class="btn btn-download download-btn">💾 Download</button>
                    </div>
                `;

                pdfItem.querySelector('.organize-btn').addEventListener('click', () => this.openOrganizeModal(-1));
                pdfItem.querySelector('.download-btn').addEventListener('click', () => this.downloadCombinedPDF());

                grid.appendChild(pdfItem);
            }

            handlePdfDragStart(e) {
                e.dataTransfer.setData('text/plain', e.currentTarget.dataset.index);
                e.currentTarget.classList.add('dragging');
            }

            handlePdfDragOver(e) {
                e.preventDefault();
            }

            handlePdfDrop(e) {
                e.preventDefault();
                const draggedIndex = parseInt(e.dataTransfer.getData('text/plain'));
                const targetIndex = parseInt(e.currentTarget.dataset.index);

                if (draggedIndex !== targetIndex) {
                    this.reorderPDFs(draggedIndex, targetIndex);
                }
            }

            handlePdfDragEnd(e) {
                e.currentTarget.classList.remove('dragging');
            }

            reorderPDFs(fromIndex, toIndex) {
                const [movedPdf] = this.pdfs.splice(fromIndex, 1);
                this.pdfs.splice(toIndex, 0, movedPdf);
                this.renderPDFs();
            }

            removePDF(index) {
                this.pdfs.splice(index, 1);
                this.renderPDFs();
                this.updateCombineButton();
            }

            updateCombineButton() {
                const combineBtn = document.getElementById('combineBtn');
                const backBtn = document.getElementById('backBtn');
                
                if (this.isCombinedView) {
                    combineBtn.style.display = 'none';
                    backBtn.style.display = 'block';
                } else {
                    combineBtn.style.display = this.pdfs.length > 0 ? 'block' : 'none';
                    backBtn.style.display = 'none';
                }
            }

            async openOrganizeModal(pdfIndex) {
                this.currentPdfIndex = pdfIndex;
                const pdf = pdfIndex === -1 ? this.combinedPdf : this.pdfs[pdfIndex];

                document.getElementById('modalTitle').textContent = `Organize: ${pdf.name}`;
                document.getElementById('organizeModal').style.display = 'block';

                await this.renderPages();
            }

            async renderPagePreview(pdf, pageIndex, container) {
                const cacheKey = `${pdf.name}-${pageIndex}`;
                
                // Check if we have a cached canvas
                if (this.pageCanvases.has(cacheKey)) {
                    const cachedCanvas = this.pageCanvases.get(cacheKey);
                    const clonedCanvas = cachedCanvas.cloneNode();
                    clonedCanvas.getContext('2d').drawImage(cachedCanvas, 0, 0);
                    container.appendChild(clonedCanvas);
                    return;
                }

                // Show loading spinner
                container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

                try {
                    const page = await pdf.pdfJsDoc.getPage(pageIndex + 1);
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };

                    await page.render(renderContext).promise;
                    
                    // Cache the canvas
                    this.pageCanvases.set(cacheKey, canvas);
                    
                    // Clear container and add canvas
                    container.innerHTML = '';
                    container.appendChild(canvas);
                } catch (error) {
                    console.error('Error rendering page:', error);
                    container.innerHTML = '<div style="color: #666; font-size: 2rem;">📄</div>';
                }
            }

            async renderPages() {
                const pagesGrid = document.getElementById('pagesGrid');
                pagesGrid.innerHTML = '';

                const pdf = this.currentPdfIndex === -1 ? this.combinedPdf : this.pdfs[this.currentPdfIndex];

                for (let arrayIndex = 0; arrayIndex < pdf.pages.length; arrayIndex++) {
                    const page = pdf.pages[arrayIndex];
                    const pageItem = document.createElement('div');
                    pageItem.className = 'page-item';
                    pageItem.draggable = true;
                    pageItem.dataset.arrayIndex = arrayIndex;

                    const pagePreview = document.createElement('div');
                    pagePreview.className = 'page-preview';

                    const pageNumber = document.createElement('div');
                    pageNumber.className = 'page-number';
                    pageNumber.textContent = `Page ${page.displayNumber}`;

                    pageItem.appendChild(pagePreview);
                    pageItem.appendChild(pageNumber);

                    // Add event listeners
                    pageItem.addEventListener('click', () => this.togglePageSelection(arrayIndex));
                    pageItem.addEventListener('dragstart', this.handlePageDragStart.bind(this));
                    pageItem.addEventListener('dragover', this.handlePageDragOver.bind(this));
                    pageItem.addEventListener('drop', this.handlePageDrop.bind(this));
                    pageItem.addEventListener('dragend', this.handlePageDragEnd.bind(this));

                    if (page.selected) {
                        pageItem.classList.add('selected');
                    }

                    pagesGrid.appendChild(pageItem);

                    // Render the page preview asynchronously
                    this.renderPagePreview(pdf, page.originalIndex, pagePreview);
                }
            }

            togglePageSelection(arrayIndex) {
                const pdf = this.currentPdfIndex === -1 ? this.combinedPdf : this.pdfs[this.currentPdfIndex];
                pdf.pages[arrayIndex].selected = !pdf.pages[arrayIndex].selected;
                
                // Update the visual state without re-rendering everything
                const pageItems = document.querySelectorAll('.page-item');
                if (pageItems[arrayIndex]) {
                    pageItems[arrayIndex].classList.toggle('selected');
                }
            }

            selectAllPages() {
                const pdf = this.currentPdfIndex === -1 ? this.combinedPdf : this.pdfs[this.currentPdfIndex];
                pdf.pages.forEach(page => page.selected = true);
                
                // Update visual state
                document.querySelectorAll('.page-item').forEach(item => {
                    item.classList.add('selected');
                });
            }

            deselectAllPages() {
                const pdf = this.currentPdfIndex === -1 ? this.combinedPdf : this.pdfs[this.currentPdfIndex];
                pdf.pages.forEach(page => page.selected = false);
                
                // Update visual state
                document.querySelectorAll('.page-item').forEach(item => {
                    item.classList.remove('selected');
                });
            }

            removeSelectedPages() {
                const pdf = this.currentPdfIndex === -1 ? this.combinedPdf : this.pdfs[this.currentPdfIndex];

                pdf.pages = pdf.pages.filter(page => !page.selected);

                pdf.pages.forEach((page, index) => {
                    page.currentIndex = index;
                    page.selected = false;
                });

                this.renderPages();
                
                if (this.currentPdfIndex === -1) {
                    this.renderCombinedPDF();
                } else {
                    this.renderPDFs();
                }
            }

            handlePageDragStart(e) {
                e.dataTransfer.setData('text/plain', e.currentTarget.dataset.arrayIndex);
                e.currentTarget.classList.add('dragging');
            }

            handlePageDragOver(e) {
                e.preventDefault();
            }

            handlePageDrop(e) {
                e.preventDefault();
                const draggedIndex = parseInt(e.dataTransfer.getData('text/plain'));
                const targetIndex = parseInt(e.currentTarget.dataset.arrayIndex);

                if (draggedIndex !== targetIndex) {
                    this.reorderPages(draggedIndex, targetIndex);
                }
            }

            handlePageDragEnd(e) {
                e.currentTarget.classList.remove('dragging');
            }

            reorderPages(fromIndex, toIndex) {
                const pdf = this.currentPdfIndex === -1 ? this.combinedPdf : this.pdfs[this.currentPdfIndex];

                const [movedPage] = pdf.pages.splice(fromIndex, 1);
                pdf.pages.splice(toIndex, 0, movedPage);

                pdf.pages.forEach((page, index) => {
                    page.currentIndex = index;
                });

                this.renderPages();
            }

            async savePdfChanges() {
                const pdf = this.currentPdfIndex === -1 ? this.combinedPdf : this.pdfs[this.currentPdfIndex];

                try {
                    const loading = document.getElementById('loading');
                    loading.style.display = 'block';

                    const newPdfDoc = await PDFLib.PDFDocument.create();
                    const originalPdfDoc = await PDFLib.PDFDocument.load(pdf.originalArrayBuffer);

                    for (const page of pdf.pages) {
                        const [copiedPage] = await newPdfDoc.copyPages(originalPdfDoc, [page.originalIndex]);
                        newPdfDoc.addPage(copiedPage);
                    }

                    const newPdfBytes = await newPdfDoc.save();

                    pdf.currentArrayBuffer = newPdfBytes;
                    pdf.pageCount = pdf.pages.length;

                    // Update PDF.js document
                    pdf.pdfJsDoc = await pdfjsLib.getDocument(newPdfBytes.slice()).promise;

                    pdf.pages.forEach(page => {
                        page.selected = false;
                    });

                    // Clear cache for this PDF
                    const keysToDelete = [];
                    for (const key of this.pageCanvases.keys()) {
                        if (key.startsWith(pdf.name)) {
                            keysToDelete.push(key);
                        }
                    }
                    keysToDelete.forEach(key => this.pageCanvases.delete(key));

                    loading.style.display = 'none';
                    
                    if (this.currentPdfIndex === -1) {
                        this.renderCombinedPDF();
                    } else {
                        this.renderPDFs();
                    }
                    
                    document.getElementById('organizeModal').style.display = 'none';

                    alert('PDF changes saved successfully!');
                } catch (error) {
                    console.error('Error saving PDF changes:', error);
                    alert('Error saving changes: ' + error.message);
                    document.getElementById('loading').style.display = 'none';
                }
            }

            async combineAllPDFs() {
                if (this.pdfs.length === 0) return;

                const loading = document.getElementById('loading');
                loading.style.display = 'block';

                try {
                    const combinedPdfDoc = await PDFLib.PDFDocument.create();
                    let totalPages = 0;
                    let allPages = [];

                    for (const pdf of this.pdfs) {
                        const pdfDoc = await PDFLib.PDFDocument.load(pdf.currentArrayBuffer);
                        const pageIndices = pdf.pages.map(page => page.currentIndex);
                        const copiedPages = await combinedPdfDoc.copyPages(pdfDoc, pageIndices);
                        copiedPages.forEach(page => combinedPdfDoc.addPage(page));

                        // Track pages for the combined PDF
                        pdf.pages.forEach((page, idx) => {
                            allPages.push({
                                originalIndex: totalPages + idx,
                                currentIndex: totalPages + idx,
                                selected: false,
                                displayNumber: totalPages + idx + 1,
                                sourcePdf: pdf.name,
                                sourcePageNumber: page.displayNumber
                            });
                        });
                        totalPages += pdf.pages.length;
                    }

                    const pdfBytes = await combinedPdfDoc.save();

                    // Create PDF.js document for the combined PDF
                    const pdfJsDoc = await pdfjsLib.getDocument(pdfBytes.slice()).promise;

                    // Create combined PDF object
                    this.combinedPdf = {
                        name: 'Combined.pdf',
                        originalArrayBuffer: pdfBytes.slice(),
                        currentArrayBuffer: pdfBytes.slice(),
                        pdfJsDoc: pdfJsDoc,
                        pageCount: totalPages,
                        originalPageCount: totalPages,
                        pages: allPages
                    };

                    // Switch to combined view
                    this.isCombinedView = true;
                    this.renderCombinedPDF();
                    this.updateCombineButton();

                    loading.style.display = 'none';
                } catch (error) {
                    console.error('Error combining PDFs:', error);
                    alert('Error combining PDFs: ' + error.message);
                    loading.style.display = 'none';
                }
            }

            downloadCombinedPDF() {
                if (!this.combinedPdf) return;

                const blob = new Blob([this.combinedPdf.currentArrayBuffer], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = this.combinedPdf.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            showIndividualPDFs() {
                this.isCombinedView = false;
                this.combinedPdf = null;
                // Clear combined PDF cache
                const keysToDelete = [];
                for (const key of this.pageCanvases.keys()) {
                    if (key.startsWith('Combined.pdf')) {
                        keysToDelete.push(key);
                    }
                }
                keysToDelete.forEach(key => this.pageCanvases.delete(key));
                
                this.renderPDFs();
                this.updateCombineButton();
            }
        }

        // Initialize the app
        document.addEventListener('DOMContentLoaded', () => {
            new PDFOrganizer();
        });
    </script>
</body>
</html>
