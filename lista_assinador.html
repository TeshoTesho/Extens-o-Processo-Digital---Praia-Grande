<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentos a Assinar</title>

    <link href="css/bootstrap.min.css" rel="stylesheet"> 
    <link rel="stylesheet" href="css/sweetalert2.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        
    <style>
        /* Estilos básicos para o container */
        
        .loading-message {
            text-align: center;
            padding: 20px;
            color: #6c757d;
        }
        /* Estilos básicos para o container */

        /* 🚨 NOVO ESTILO: Modal de Loading */
        #loading-modal {
            display: none; /* Inicia oculto */
            position: fixed;
            z-index: 1050; /* Acima de outros elementos */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4); /* Fundo escuro semi-transparente */
        }

        .loading-content {
            background-color: #fefefe;
            margin: 15% auto; /* Centraliza verticalmente */
            padding: 20px;
            border: 1px solid #888;
            width: 80%; /* Ou outro tamanho */
            max-width: 300px;
            border-radius: .3rem;
            text-align: center;
        }

        .tooltip-inner {
            max-width: 300px; /* Aumente este valor se 300px ainda for pequeno */
            text-align: center; /* Garante que o conteúdo interno comece à esquerda */
            white-space: normal; /* Permite a quebra de linha do texto (padrão Bootstrap) */
        }
 .app-icon img {
  width: 26px;
  height: 26px;
  object-fit: contain; /* Garante que a imagem não distorça */
  margin: 0 auto;
}
        /* Fim do NOVO ESTILO */
    </style>
</head>
<body >

    <div class="container">

        <header class="mb-4">
           <a href="lista_assinador.html" class='link-offset-2 link-underline link-underline-opacity-0'> <h1 class="h4 text-primary">📑 Documentos Do Assinador Digital ADM</h1></a>
        </header>


    </div>
<div class="container mb-3">
    <div class="input-group">
        <input id="Busca" type="text" class="form-control" placeholder="Pesquisar processos por título, número ou ID...">

        <select id="selectGrupo" class="form-select" style="max-width: 240px; ">
            <option value="todos">📁 Todos os Documentos</option>
        </select>

        <button id="btnCriarGrupo" class="btn btn-outline-primary" title="Novo Grupo">
            <i class="fa fa-plus"></i>
        </button>
        <button id="btnGerenciarGrupos" class="btn btn-outline-danger" title="Excluir Grupo">
            <i class="fa fa-trash"></i>
        </button>
    </div>
    <small id="avisoProcessosAntigos" class="text-muted d-none text-center mt-2" style="display: block; margin-top: 5px;">
        <i class="fa fa-info-circle"></i> Ao selecionar um grupo, links e processos antigos também podem ser listados.
    </small>
</div>
    <div class="container mt-4">
     <div class="row">
      <div class="col d-flex justify-content-start">
        <p id="countDocs" class="mt-3">0 Documentos</p>
    </div>

    <div class="col d-flex justify-content-end mb-3 ">
        <button id="toggleView" class="btn btn-primary text-white">
            📄 Visualizar como Tabela
        </button>
    </div>
</div>
<div class="row justify-content-center" id="documents-list"></div>
</div>

<hr>

<footer class="text-center text-muted small">
    <p id='VoltaAssinador'>Clique aqui para voltar a usar o Assinador Original</p>
</footer>

</div>

<div id="loading-modal">
    <div class="loading-content shadow bg-white">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2 text-muted">Aguarde... Buscando documentos.</p>
    </div>
</div>
<script src="js/popper.min.js"></script>
<script src="js/bootstrap.min.js"></script>

<script src="lista_assinador.js"></script>

<script src="theme.js"></script>
  <script src="js/sweetalert2.min.js"></script>

    <script src="secretarias.js"></script>
</body>
</html>
