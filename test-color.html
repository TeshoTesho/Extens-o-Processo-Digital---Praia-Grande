<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Teste de Contraste de Tags</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; background: #f0f0f0; }
        .controls { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        
        .preview-container { display: flex; width: 100%; max-width: 1000px; height: 400px; border-radius: 12px; overflow: hidden; border: 2px solid #ccc; }
        .side { flex: 1; padding: 40px; display: flex; flex-direction: column; gap: 20px; align-items: flex-start; transition: 0.3s; }
        
        /* Simulação do seu site */
        .dark { background-color: #1a1a1b; color: #fff; }
        .light { background-color: #ffffff; color: #000; }

        /* Estilo da Tag (Baseado no seu print) */
        .tag-mockup {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            letter-spacing: 0.5px;
        }

        button { cursor: pointer; padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #0056b3; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="input-group">
            <label>Texto da Tag:</label>
            <input type="text" id="tagText" value="TERMO DE PRORROGAÇÃO">
        </div>
        <div class="input-group">
            <label>Cor de Fundo (Hex):</label>
            <input type="color" id="bgColor" value="#CBFF00">
        </div>
        <div class="input-group">
            <label>Cor do Texto:</label>
            <input type="color" id="textColor" value="#000000">
        </div>
        <button onclick="updateTags()">Testar Cores</button>
    </div>

    <div class="preview-container">
        <div class="side dark">
            <h3>Modo Escuro</h3>
            <p>Último trâmite: 10/03/2026 08:48</p>
            <div id="tagDark" class="tag-mockup">TERMO DE PRORROGAÇÃO</div>
            <span>Prazo: 12/03/2026</span>
        </div>

        <div class="side light">
            <h3>Modo Claro</h3>
            <p>Último trâmite: 10/03/2026 08:48</p>
            <div id="tagLight" class="tag-mockup">TERMO DE PRORROGAÇÃO</div>
            <span>Prazo: 12/03/2026</span>
        </div>
    </div>

    <script>
        function updateTags() {
            const text = document.getElementById('tagText').value;
            const bg = document.getElementById('bgColor').value;
            const color = document.getElementById('textColor').value;

            const tags = [document.getElementById('tagDark'), document.getElementById('tagLight')];
            
            tags.forEach(tag => {
                tag.innerText = text;
                tag.style.backgroundColor = bg;
                tag.style.color = color;
            });
        }
        
        // Iniciar com as cores padrão
        updateTags();
    </script>

</body>
</html>
