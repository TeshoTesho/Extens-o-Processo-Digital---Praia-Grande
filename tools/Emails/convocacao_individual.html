<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de E-mail - Convoca&ccedil;&atilde;o Digital</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f4f4f4;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        textarea {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .input30{
            width: calc(30% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
            margin-left: 10px;
        }

        .input50{
            width: calc(50% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
            margin-left: 10px;
        }
        .input70{
            width: calc(70% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
            margin-left: 10px;
        }
        .input100{
             width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;

            margin-left: 10px;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }
        button {
            padding: 10px 15px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #email_gerado {
            margin-top: 30px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #ffffff;
            font-size: 14px;
            line-height: 1;
            white-space: pre-wrap;
            font-family: Arial, sans-serif; /* Alterado para Arial */
            position: relative; /* Para posicionar o botão de copiar */
        }
        #email_gerado h2{
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .data-manual {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .hidden {
            display: none;
        }
        #copiar_email {
            position: absolute;
            top: 10px;
            right: 130px;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: background-color 0.3s ease;
        }
        #copiar_email:hover {
            background-color: #367c39;
        }
        #copiar_email:active {
            background-color: #2b5e2e;
        }
        #selecionar_email {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: background-color 0.3s ease;
        }
        #selecionar_email:hover {
            background-color: #0056b3;
        }
        #selecionar_email:active {
            background-color: #004080;
        }
    </style>
</head>
<body>
    <h1>Convocação para assinatura de Termos/Contratos (Assinatura Digital com link)</h1>

    <form id="convocacao_digital_form">
        <label for="objeto_termo_1">Objeto do termo. EX.: Termo de Ata para Registro de Pre&ccedil;os:</label>

        <select class='input30' id="tipo_termo" name="tipo_termo" required>  
                <option value="Termo de Ata ">Termo de Ata </option>
                <option value="Termo de Prorrogação ">Termo de Prorrogação</option>
                <option value="Contrato">Contrato</option>
                <option value="Termo de Prorrogação de Ata">Termo de Prorrogação de Ata</option>
                <option value=" ">Vazio</option>
        </select>
        <input class='input70' type="text" id="objeto_termo_1" name="objeto_termo_1" required value='DE REGISTRO DE PREÇOS PARA AQUISIÇÃO ...'>

        <label for="modalidade_licitacao_1">Modalidade da licita&ccedil;&atilde;o. EX.: Preg&atilde;o Eletr&ocirc;nico n&ordm;. 060/2024:</label>
        <select class='input30' id="modalidade_licitacao_1" name="modalidade_licitacao_1" required>  
                <option value="Pregão Eletrônico nº ">Pregão Eletônico nº</option>
                <option value="Chamamento Público nº ">Chamamento Público nº</option>
                <option value=" ">Vazio</option>
        </select>
           
        <input class='input70'  type="text" id="modalidade_licitacao_2" name="modalidade_licitacao_2" required value='' placeholder="014/2025">


        <label for="numero_processo_1">N&uacute;mero do processo:</label>
        <input class='input30' type="text" id="numero_processo_1" name="numero_processo_1" placeholder="14800/2021 A.1 D" required>

        <label for="nome_representante">Nome do Representante da Empresa e Link:</label>
        <input class='input30' type="text" id="nome_representante" name="nome_representante" required>

        <input class='input70' type="text" id="link_assinatura" name="link_assinatura" placeholder="Link para Assinatura Digital" required>

        <label for="data_inicio_1">Data de In&iacute;cio:</label>
        <input type="date" id="data_inicio_1" name="data_inicio_1" readonly class='input30'>

        <div class="data-manual">
            <label for="data_fim_manual">Data de Fim:</label>
            <input type="date" id="data_fim_automatica" name="data_fim_automatica" readonly class='input30'>
            <input type="checkbox" id="data_fim_manual_check" name="data_fim_manual_check" class=''>
            <label for="data_fim_manual_check">Inserir data manualmente</label>
            <input type="date" id="data_fim_manual" name="data_fim_manual" class="hidden input30">
        </div>

        <button type="button" id='GerarMail'>Gerar E-mail</button>
         <button type="button" id="btnCopiar" hidden="true">Copiar sem formatação</button>
    </form>

 <div id="email_gerado" class="hidden">

   
    <button type="button" id="btnSelecionar">Selecionar tudo</button>
    <div id="titulo_email"></div>
    <div id="output_email"></div>
</div>

<script src="theme.js"></script>
    <script src='convocacao_individual.js'></script>


</body>
</html>
